<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST3215 Servo Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 24px;
  }

  h1 { font-size: 1.6rem; font-weight: 700; color: #7dd3fc; margin-bottom: 6px; }
  .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 28px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 20px;
  }

  .card {
    background: #1e2330;
    border: 1px solid #2d3548;
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .card.online  { border-color: #334155; }
  .card.offline { opacity: 0.45; border-color: #ef4444; }
  .card.moving  { border-color: #facc15; }
  .card.motor-mode { border-color: #a78bfa55; }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-header-left { display: flex; align-items: center; gap: 10px; }
  .servo-label { font-size: 1.1rem; font-weight: 700; color: #7dd3fc; }

  /* Mode badge */
  .mode-badge {
    font-size: 0.65rem; font-weight: 700; padding: 2px 8px;
    border-radius: 99px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .mode-badge.servo { background: #1e3a5f; color: #7dd3fc; }
  .mode-badge.motor { background: #2d1f3d; color: #c084fc; }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }
  .status-dot.online { background: #22c55e; }
  .status-dot.moving { background: #facc15; animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { opacity:1; } to { opacity:0.3; } }

  /* Live position */
  .pos-display { text-align: center; font-size: 1.6rem; font-weight: 700; color: #f1f5f9; letter-spacing: 1px; }
  .pos-sub     { text-align: center; font-size: 0.78rem; color: #64748b; margin-bottom: 12px; margin-top: 2px; }

  /* Position bar */
  .bar-wrap {
    background: #0f1117; border-radius: 8px; height: 14px;
    position: relative; margin-bottom: 6px; overflow: visible;
  }
  .bar-range { position: absolute; height: 100%; background: #1e40af44; border-radius: 8px; transition: left 0.3s, width 0.3s; }
  .bar-current {
    position: absolute; top: -3px; width: 6px; height: 20px;
    background: #7dd3fc; border-radius: 3px;
    transform: translateX(-50%); transition: left 0.15s;
  }
  .bar-labels { display: flex; justify-content: space-between; font-size: 0.68rem; color: #64748b; margin-bottom: 10px; }

  /* Range info row */
  .info-row {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: #64748b; margin-bottom: 6px;
  }
  .info-row .val { color: #94a3b8; font-weight: 600; }

  /* Mode toggle */
  .mode-toggle {
    display: flex; gap: 6px; margin: 12px 0;
  }
  .mode-btn {
    flex: 1; padding: 7px; border: 2px solid transparent;
    border-radius: 8px; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .mode-btn.servo-btn { background: #0f1117; color: #7dd3fc; border-color: #1e3a5f; }
  .mode-btn.servo-btn.active { background: #1e3a5f; border-color: #7dd3fc; }
  .mode-btn.motor-btn { background: #0f1117; color: #c084fc; border-color: #2d1f3d; }
  .mode-btn.motor-btn.active { background: #2d1f3d; border-color: #c084fc; }

  /* Servo position controls */
  .servo-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .btn {
    width: 44px; height: 44px; border-radius: 10px; border: none;
    font-size: 1.4rem; font-weight: 700; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn:active { transform: scale(0.92); }
  .btn-minus { background: #334155; color: #f1f5f9; }
  .btn-minus:hover { background: #ef4444; }
  .btn-plus  { background: #334155; color: #f1f5f9; }
  .btn-plus:hover  { background: #22c55e; }
  .btn-minus:disabled, .btn-plus:disabled { opacity: 0.3; cursor: not-allowed; }
  .step-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .step-label { font-size: 0.7rem; color: #64748b; }
  .range-slider {
    width: 100%; -webkit-appearance: none; height: 4px;
    border-radius: 2px; background: #334155; outline: none;
  }
  .range-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: #7dd3fc; cursor: pointer;
  }

  /* Motor wheel controls */
  .motor-controls { display: none; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .motor-controls.active { display: flex; }
  .motor-btns { display: flex; gap: 8px; }
  .motor-btn-dir {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .motor-btn-dir:active { transform: scale(0.95); }
  .btn-cw   { background: #14532d; color: #4ade80; }
  .btn-cw:hover   { background: #16a34a; }
  .btn-stop { background: #450a0a; color: #f87171; }
  .btn-stop:hover { background: #dc2626; color: #fff; }
  .btn-ccw  { background: #1e1b4b; color: #818cf8; }
  .btn-ccw:hover  { background: #4338ca; color: #fff; }

  .motor-speed-wrap { display: flex; align-items: center; gap: 10px; }
  .motor-speed-wrap label { font-size: 0.72rem; color: #64748b; white-space: nowrap; }
  .motor-speed-wrap .speed-val { font-size: 0.8rem; font-weight: 700; color: #c084fc; min-width: 40px; text-align: right; }
  .motor-speed-wrap .range-slider::-webkit-slider-thumb { background: #c084fc; }
  .mspeed-display {
    text-align: center; font-size: 1.1rem; font-weight: 700;
    padding: 6px; border-radius: 8px; background: #0f1117;
    margin-bottom: 8px; letter-spacing: 1px;
  }
  .motor-pos-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .motor-pos-chip {
    flex: 1; background: #0f1117; border-radius: 8px;
    padding: 6px 10px; text-align: center;
    border: 1px solid #2d3548;
  }
  .motor-pos-val { display: block; font-size: 1.1rem; font-weight: 700; color: #c084fc; }
  .motor-pos-lbl { display: block; font-size: 0.62rem; color: #64748b; margin-top: 2px; }

  /* Wrap toggle */
  .wrap-toggle { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 0.68rem; color: #64748b; }
  .wrap-toggle input { accent-color: #f97316; cursor: pointer; }
  .wrap-toggle:hover span { color: #f97316; }

  /* Telemetry chips */
  .telem { display: flex; gap: 8px; margin-bottom: 12px; }
  .telem-chip { flex: 1; background: #0f1117; border-radius: 8px; padding: 6px 8px; text-align: center; }
  .telem-chip .val { font-size: 0.9rem; font-weight: 700; color: #e2e8f0; }
  .telem-chip .lbl { font-size: 0.62rem; color: #64748b; margin-top: 1px; }

  /* Action buttons */
  .action-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-action {
    flex: 1; padding: 7px; border: none; border-radius: 8px;
    font-size: 0.75rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-action:active { transform: scale(0.95); }
  .btn-zero    { background: #1e3a5f; color: #7dd3fc; }
  .btn-zero:hover    { background: #2563eb; color: #fff; }
  .btn-middle  { background: #143a2a; color: #6ee7b7; }
  .btn-middle:hover  { background: #059669; color: #fff; }
  .btn-limits  { background: #2d1f3d; color: #c084fc; }
  .btn-limits:hover  { background: #7c3aed; color: #fff; }
  .btn-release { background: #3d2000; color: #fb923c; }
  .btn-release:hover { background: #ea580c; color: #fff; }
  .btn-engage  { background: #052e16; color: #4ade80; }
  .btn-engage:hover  { background: #16a34a; color: #fff; }
  .action-msg { font-size: 0.72rem; min-height: 16px; margin-top: 5px; text-align: center; color: #22c55e; }

  /* Recording */
  .rec-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.75rem; font-weight: 700; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .rec-count { font-size: 0.75rem; color: #f87171; font-weight: 700; }
  .btn-rec-start { background: #450a0a; color: #f87171; }
  .btn-rec-start:hover { background: #dc2626; color: #fff; }
  .btn-rec-stop  { background: #1a1a1a; color: #f87171; border: 2px solid #f87171; animation: recpulse 1s infinite alternate; }
  .btn-rec-dl    { background: #1e3a5f; color: #7dd3fc; }
  .btn-rec-dl:hover { background: #2563eb; color: #fff; }
  .btn-apply-rec { background: #14532d; color: #4ade80; }
  .btn-apply-rec:hover { background: #16a34a; color: #fff; }
  .btn-load-csv  { background: #1e3a5f; color: #7dd3fc; }
  .btn-load-csv:hover  { background: #2563eb; color: #fff; }
  .btn-set-manual { background: #2d2000; color: #fbbf24; }
  .btn-set-manual:hover { background: #b45309; color: #fff; }
  .manual-row { display: flex; gap: 6px; align-items: center; }
  .manual-input {
    flex: 1; background: #0f1117; border: 1px solid #334155;
    border-radius: 6px; padding: 6px 8px; color: #e2e8f0;
    font-size: 0.8rem; width: 0; min-width: 0;
  }
  @keyframes recpulse { from { opacity: 1; } to { opacity: 0.5; } }
  .rec-status { font-size: 0.7rem; color: #64748b; min-height: 14px; margin-top: 4px; }

  /* E-stop */
  #estop-btn {
    background: #dc2626; color: #fff; border: 3px solid #ef4444;
    border-radius: 12px; padding: 12px 28px; font-size: 1rem;
    font-weight: 800; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 0 20px #dc262688; transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
  }
  #estop-btn:hover  { background: #ef4444; box-shadow: 0 0 32px #ef444499; }
  #estop-btn:active { transform: scale(0.95); }
  #estop-btn.stopped { background: #1e2330; border-color: #f97316; color: #f97316; box-shadow: 0 0 20px #f9731644; }

  /* Global bar */
  .global-bar {
    display: flex; align-items: center; gap: 16px;
    background: #1e2330; border: 1px solid #2d3548;
    border-radius: 12px; padding: 14px 20px; margin-bottom: 24px;
  }
  .global-bar label { font-size: 0.85rem; color: #94a3b8; white-space: nowrap; }
  .global-bar input[type=range] {
    flex: 1; -webkit-appearance: none; height: 4px;
    border-radius: 2px; background: #334155; outline: none;
  }
  .global-bar input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: #a78bfa; cursor: pointer;
  }
  .global-bar .speed-val { font-size: 0.9rem; font-weight: 700; color: #a78bfa; width: 60px; text-align: right; }
  .play-panel {
    background: #18202a; border: 1px solid #2d3548; border-radius: 12px;
    padding: 16px 18px; margin-bottom: 22px;
  }
  .play-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
  .play-title { font-size: 0.85rem; font-weight: 800; letter-spacing: 0.08em; color: #93c5fd; text-transform: uppercase; }
  .play-status { font-size: 0.78rem; color: #94a3b8; min-height: 18px; }
  .play-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
  .play-btn {
    border: 1px solid #334155; border-radius: 10px; padding: 10px 12px;
    background: linear-gradient(180deg, #162130 0%, #101722 100%);
    color: #e2e8f0; cursor: pointer; text-align: left;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
  }
  .play-btn:hover { border-color: #60a5fa; background: linear-gradient(180deg, #1a2940 0%, #111c2d 100%); }
  .play-btn:active { transform: scale(0.98); }
  .play-btn strong { display:block; font-size:0.88rem; margin-bottom:4px; }
  .play-btn span { display:block; font-size:0.72rem; color:#94a3b8; line-height:1.3; }
  .play-stop { background: linear-gradient(180deg, #351515 0%, #221010 100%); }
  .play-stop:hover { border-color: #f87171; background: linear-gradient(180deg, #451717 0%, #2a1010 100%); }

  hr.divider { border: none; border-top: 1px solid #2d3548; margin: 12px 0; }
  .mode-toggle, .motor-controls, .limit-section, .record-section, .advanced-actions { display: none !important; }

  /* Joint limits */
  .limit-header {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.75rem; font-weight: 700; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .btn-clear-limits {
    background: none; border: 1px solid #334155; border-radius: 6px;
    color: #64748b; font-size: 0.7rem; padding: 2px 8px; cursor: pointer;
  }
  .btn-clear-limits:hover { color: #ef4444; border-color: #ef4444; }

  .limit-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .limit-box {
    flex: 0 0 70px; background: #0f1117; border-radius: 8px;
    padding: 6px 8px; text-align: center;
    border: 2px solid #1e2330; transition: border-color 0.2s;
  }
  .limit-box.set-min { border-color: #fb923c; }
  .limit-box.set-max { border-color: #4ade80; }
  .limit-val { font-size: 0.85rem; font-weight: 700; color: #e2e8f0; }
  .limit-lbl { font-size: 0.6rem; color: #64748b; margin-top: 2px; }

  .limit-btns { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .btn-setmin { background: #3d1f00; color: #fb923c; }
  .btn-setmin:hover { background: #ea580c; color: #fff; }
  .btn-setmax { background: #052e16; color: #4ade80; }
  .btn-setmax:hover { background: #16a34a; color: #fff; }

  /* Limit range bar */
  .limit-bar-wrap {
    position: relative; height: 8px; background: #0f1117;
    border-radius: 4px; margin-bottom: 4px;
  }
  .limit-bar-full   { position: absolute; inset: 0; background: #1e293b; border-radius: 4px; }
  .limit-bar-active {
    position: absolute; height: 100%; background: #16a34a44;
    border-radius: 4px; transition: left 0.2s, width 0.2s;
  }
  .limit-bar-pos {
    position: absolute; top: -3px; width: 6px; height: 14px;
    background: #7dd3fc; border-radius: 3px;
    transform: translateX(-50%); transition: left 0.15s;
  }
</style>
</head>
<body>

<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
  <h1>ST3215 Servo Dashboard</h1>
  <button id="estop-btn" onclick="emergencyStop()">&#9632; EMERGENCY STOP</button>
</div>
<p class="subtitle">Incremental step control with fixed joint limits for servos 1-5</p>

<div class="global-bar">
  <label>Servo Move Speed</label>
  <input type="range" id="global-speed" min="50" max="3000" value="500" step="50">
  <span class="speed-val" id="speed-display">500</span>
</div>

<div class="play-panel">
  <div class="play-head">
    <div class="play-title">SO100 Plays</div>
    <div class="play-status" id="play-status">Idle</div>
  </div>
  <div class="play-grid">
    <button class="play-btn" onclick="runPlay('neutral')"><strong>Neutral Pose</strong><span>Move all joints to a safe centered stance.</span></button>
    <button class="play-btn" onclick="runPlay('look')"><strong>Look Around</strong><span>Base, shoulder and wrist scan left and right.</span></button>
    <button class="play-btn" onclick="runPlay('wave')"><strong>Wave Hello</strong><span>Lift the arm and animate the wrist with servo 6.</span></button>
    <button class="play-btn" onclick="runPlay('reach')"><strong>Reach Sweep</strong><span>Extend outward, sweep, then retract to neutral.</span></button>
    <button class="play-btn" onclick="runPlay('nod')"><strong>Nod Yes</strong><span>Shoulder and elbow pulse in a compact yes-like motion.</span></button>
    <button class="play-btn" onclick="runPlay('scan')"><strong>Perimeter Scan</strong><span>Pan the base through a wider left-right inspection arc.</span></button>
    <button class="play-btn" onclick="runPlay('pickup')"><strong>Pick And Place</strong><span>Dip down, lift up, and place across the workspace.</span></button>
    <button class="play-btn" onclick="runPlay('spiral')"><strong>Spiral Trace</strong><span>Walk the wrist through an inward-outward circular trace.</span></button>
    <button class="play-btn" onclick="runPlay('bow')"><strong>Bow</strong><span>Fold forward and return with a gentle wrist finish.</span></button>
    <button class="play-btn" onclick="runPlay('drum')"><strong>Desk Drum</strong><span>Tap two alternating down-up beats near center.</span></button>
    <button class="play-btn play-stop" onclick="stopPlay()"><strong>Stop Play</strong><span>Cancel the active sequence immediately.</span></button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const SERVO_IDS = [1, 2, 3, 4, 5, 6];
const MAX_POS   = 4095;

const speedSlider  = document.getElementById('global-speed');
const speedDisplay = document.getElementById('speed-display');
speedSlider.addEventListener('input', () => speedDisplay.textContent = speedSlider.value);
const getSpeed = () => parseInt(speedSlider.value);

// Per-servo state
const localPos  = {};
const servoMode = {};  // 0=servo, 1=motor
const lastStatus = {};
let playToken = 0;

const PLAY_POSES = {
  neutral: {1: 3200, 2: 2500, 3: 850, 4: 1150, 5: 2550, 6: 3600},
  ready:   {1: 3450, 2: 2900, 3: 1050, 4: 1350, 5: 2850, 6: 3720},
  reach:   {1: 3600, 2: 3200, 3: 1280, 4: 1650, 5: 3100, 6: 3450},
  left:    {1: 3000, 2: 2850, 3: 1020, 4: 1380, 5: 2920, 6: 3320},
  right:   {1: 3840, 2: 2850, 3: 1020, 4: 1380, 5: 2920, 6: 3920},
  waveA:   {1: 3440, 2: 3020, 3: 1180, 4: 1510, 5: 3060, 6: 3340},
  waveB:   {1: 3440, 2: 3020, 3: 1180, 4: 1510, 5: 3060, 6: 3920},
  tuck:    {1: 3140, 2: 2140, 3: 620, 4: 940, 5: 2350, 6: 3600},
  nodUp:   {1: 3200, 2: 2660, 3: 980, 4: 1260, 5: 2720, 6: 3600},
  nodDown: {1: 3200, 2: 2280, 3: 720, 4: 1000, 5: 2440, 6: 3600},
  farLeft: {1: 2860, 2: 2760, 3: 980, 4: 1360, 5: 2860, 6: 3280},
  farRight:{1: 4020, 2: 2760, 3: 980, 4: 1360, 5: 2860, 6: 3980},
  pickLow: {1: 3320, 2: 2060, 3: 560, 4: 900, 5: 2240, 6: 3520},
  liftMid: {1: 3440, 2: 2860, 3: 1080, 4: 1450, 5: 2980, 6: 3520},
  placeRight: {1: 3860, 2: 2580, 3: 940, 4: 1320, 5: 2860, 6: 3820},
  spiralOuterL: {1: 3020, 2: 3000, 3: 1180, 4: 1560, 5: 3050, 6: 3340},
  spiralOuterR: {1: 3740, 2: 3000, 3: 1180, 4: 1560, 5: 3050, 6: 3880},
  spiralInnerR: {1: 3560, 2: 2520, 3: 860, 4: 1180, 5: 2620, 6: 3900},
  spiralInnerL: {1: 3200, 2: 2520, 3: 860, 4: 1180, 5: 2620, 6: 3340},
  bowLow:  {1: 3200, 2: 2140, 3: 620, 4: 900, 5: 2260, 6: 3600},
  bowRise: {1: 3200, 2: 2720, 3: 1000, 4: 1320, 5: 2820, 6: 3720},
  drumLeft:{1: 3140, 2: 2200, 3: 640, 4: 920, 5: 2300, 6: 3480},
  drumRight:{1: 3460, 2: 2200, 3: 640, 4: 920, 5: 2300, 6: 3760},
};

const PLAY_SEQUENCES = {
  neutral: [
    { pose: 'neutral', hold: 500, label: 'Neutral pose' },
  ],
  look: [
    { pose: 'neutral', hold: 400, label: 'Centering arm' },
    { pose: 'left', hold: 700, label: 'Looking left' },
    { pose: 'right', hold: 900, label: 'Looking right' },
    { pose: 'left', hold: 700, label: 'Looking left again' },
    { pose: 'neutral', hold: 500, label: 'Returning to center' },
  ],
  wave: [
    { pose: 'ready', hold: 700, label: 'Lifting to ready' },
    { pose: 'waveA', hold: 350, label: 'Wave 1A' },
    { pose: 'waveB', hold: 350, label: 'Wave 1B' },
    { pose: 'waveA', hold: 350, label: 'Wave 2A' },
    { pose: 'waveB', hold: 350, label: 'Wave 2B' },
    { pose: 'ready', hold: 500, label: 'Settling' },
    { pose: 'neutral', hold: 500, label: 'Back to neutral' },
  ],
  reach: [
    { pose: 'neutral', hold: 400, label: 'Centering arm' },
    { pose: 'reach', hold: 900, label: 'Reaching out' },
    { pose: 'left', hold: 700, label: 'Sweeping left' },
    { pose: 'right', hold: 700, label: 'Sweeping right' },
    { pose: 'tuck', hold: 700, label: 'Retracting' },
    { pose: 'neutral', hold: 500, label: 'Back to neutral' },
  ],
  nod: [
    { pose: 'neutral', hold: 300, label: 'Centering arm' },
    { pose: 'nodUp', hold: 300, label: 'Nod up' },
    { pose: 'nodDown', hold: 320, label: 'Nod down' },
    { pose: 'nodUp', hold: 300, label: 'Nod up again' },
    { pose: 'nodDown', hold: 320, label: 'Nod down again' },
    { pose: 'neutral', hold: 400, label: 'Settling to neutral' },
  ],

// ── Helpers ───────────────────────────────────────────────────────────────────
function showMsg(sid, text, color = '#22c55e') {
  const el = document.getElementById(`msg-${sid}`);
  el.style.color  = color;
  el.textContent  = text;
  setTimeout(() => el.textContent = '', 3500);
}

function updateBar(sid, rawPos, minRaw, maxRaw) {
  const pct = rawPos / MAX_POS * 100;
  document.getElementById(`bar-cur-${sid}`).style.left = pct + '%';
  if (minRaw !== null && maxRaw !== null) {
    const el = document.getElementById(`bar-range-${sid}`);
    el.style.left  = (minRaw / MAX_POS * 100) + '%';
    el.style.width = ((maxRaw - minRaw) / MAX_POS * 100) + '%';
  }
}

// ── Mode switch ───────────────────────────────────────────────────────────────
async function setMode(sid, mode) {
  const res = await fetch('/api/set_mode', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid, mode })
  });
  const d = await res.json();
  if (!d.ok) { showMsg(sid, 'Mode switch failed', '#ef4444'); return; }

  applyModeUI(sid, mode);
  showMsg(sid, mode === 0 ? 'Switched to Servo mode' : 'Switched to Motor mode',
              mode === 0 ? '#7dd3fc' : '#c084fc');
}

function applyModeUI(sid, mode) {
  servoMode[sid] = mode;
  if (mode === 1) updateMotorDisplay(sid, motorSpeed[sid] ?? 0);
  const isMotor = mode === 1;

  const servoCtrl = document.getElementById(`servo-ctrl-${sid}`);
  const motorCtrl = document.getElementById(`motor-ctrl-${sid}`);
  const servoBtn = document.getElementById(`mbtn-servo-${sid}`);
  const motorBtn = document.getElementById(`mbtn-motor-${sid}`);
  if (servoCtrl) servoCtrl.style.display = isMotor ? 'none' : '';
  if (motorCtrl) motorCtrl.classList.toggle('active', isMotor);
  if (servoBtn) servoBtn.classList.toggle('active', !isMotor);
  if (motorBtn) motorBtn.classList.toggle('active', isMotor);

  const badge = document.getElementById(`badge-${sid}`);
  badge.textContent  = isMotor ? 'Motor' : 'Servo';
  badge.className    = `mode-badge ${isMotor ? 'motor' : 'servo'}`;

  const card = document.getElementById(`card-${sid}`);
  if (isMotor) card.classList.add('motor-mode');
  else         card.classList.remove('motor-mode');

  // Bar labels differ: motor mode shows position wrapping note
  document.getElementById(`bar-lbl-${sid}`).innerHTML = isMotor
    ? '<span>0</span><span style="color:#c084fc">position (wraps)</span><span>4095</span>'
    : '<span>0</span><span>2048</span><span>4095</span>';
}

// ── Motor speed state ─────────────────────────────────────────────────────────
const motorSpeed = {};  // {sid: current_speed}

function updateMotorDisplay(sid, speed) {
  motorSpeed[sid] = speed;
  const el  = document.getElementById(`mspeed-display-${sid}`);
  const abs = Math.abs(speed);
  if (speed === 0) {
    el.style.color = '#64748b';
    el.textContent = 'Speed: 0  (stopped)';
  } else if (speed > 0) {
    el.style.color = '#4ade80';
    el.textContent = `Speed: +${abs}  ↻ CW`;
  } else {
    el.style.color = '#818cf8';
    el.textContent = `Speed: −${abs}  ↺ CCW`;
  }
}

function sendMotorSpeed(sid, speed) {
  speed = Math.max(-3400, Math.min(3400, speed));
  updateMotorDisplay(sid, speed);
  fetch('/api/motor_speed', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid, speed })
  });
}

function motorStep(sid, dir) {
  const step    = parseInt(document.getElementById(`mstep-${sid}`).value);
  const current = motorSpeed[sid] ?? 0;
  sendMotorSpeed(sid, current + dir * step);
}

function motorStop(sid) {
  sendMotorSpeed(sid, 0);
}

function setPlayStatus(text, color = '#94a3b8') {
  const el = document.getElementById('play-status');
  if (!el) return;
  el.textContent = text;
  el.style.color = color;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function clampRawToStatus(sid, raw) {
  const s = lastStatus[sid];
  if (!s) return raw;
  const lo = typeof s.sw_min === 'number' ? s.sw_min : 0;
  const hi = typeof s.sw_max === 'number' ? s.sw_max : MAX_POS;
  return Math.max(lo, Math.min(hi, raw));
}

async function sendRawMove(sid, rawPos, speed = getSpeed()) {
  const s = lastStatus[sid] || {};
  const raw = clampRawToStatus(sid, rawPos);
  const offset = typeof s.offset === 'number' ? s.offset : 0;
  await sendMove(sid, raw - offset, speed);
}

async function applyPoseRaw(poseName, speed = getSpeed(), staggerMs = 90) {
  const pose = PLAY_POSES[poseName];
  if (!pose) return;
  for (const sid of Object.keys(pose).map(Number)) {
    await sendRawMove(sid, pose[sid], speed);
    await sleep(staggerMs);
  }
}

async function runPlay(name) {
  const sequence = PLAY_SEQUENCES[name];
  if (!sequence) return;
  const token = ++playToken;
  setPlayStatus(`Running: ${name}`, '#93c5fd');
  try {
    for (const step of sequence) {
      if (token !== playToken) return;
      setPlayStatus(step.label, '#93c5fd');
      await applyPoseRaw(step.pose);
      await sleep(step.hold);
    }
    if (token === playToken) setPlayStatus(`Completed: ${name}`, '#6ee7b7');
  } catch (err) {
    console.error('Play failed', err);
    setPlayStatus(`Play failed: ${name}`, '#f87171');
  }
}

function stopPlay() {
  playToken += 1;
  setPlayStatus('Play stopped', '#fbbf24');
}

// ── Servo step / move ─────────────────────────────────────────────────────────
function step(sid, dir) {
  const stepVal = parseInt(document.getElementById(`step-${sid}`).value);
  const cur     = localPos[sid] ?? 0;
  sendMove(sid, cur + dir * stepVal);
}

async function sendMove(sid, calPos) {
  localPos[sid] = calPos;
  try {
    await fetch('/api/move', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ id: sid, pos: calPos, speed: getSpeed() })
    });
  } catch(e) { console.error('Move failed', e); }
}

// ── Emergency stop ────────────────────────────────────────────────────────────
async function emergencyStop() {
  const btn = document.getElementById('estop-btn');
  btn.textContent = '⚠ STOPPED — Click to Resume';
  btn.classList.add('stopped');
  btn.onclick = resumeAll;
  await fetch('/api/estop', { method: 'POST' });
}

async function resumeAll() {
  const btn = document.getElementById('estop-btn');
  btn.textContent = '■ EMERGENCY STOP';
  btn.classList.remove('stopped');
  btn.onclick = emergencyStop;
}

  });

  document.getElementById(`release-${sid}`).style.display = '';
  document.getElementById(`minus-${sid}`).disabled = false;
  document.getElementById(`plus-${sid}`).disabled  = false;

// Cache last known limit values so wrap-toggle can redraw without new poll data
const limitCache = {};  // {sid: {raw, swMin, swMax}}

function updateLimitBar(sid, raw, swMin, swMax) {
  // Use cached values if called from checkbox change (nulls passed)
  const cache = limitCache[sid] || {};
  if (raw   === null) raw   = cache.raw   ?? 0;
  if (swMin === null) swMin = cache.swMin ?? null;
  if (swMax === null) swMax = cache.swMax ?? null;
  limitCache[sid] = { raw, swMin, swMax };

  const posEl  = document.getElementById(`lim-pos-${sid}`);
  const barEl  = document.getElementById(`lim-bar-${sid}`);
  const minEl  = document.getElementById(`lim-min-${sid}`);
  const maxEl  = document.getElementById(`lim-max-${sid}`);
  const minBox = document.getElementById(`lim-min-box-${sid}`);
  const maxBox = document.getElementById(`lim-max-box-${sid}`);
  const wrap   = document.getElementById(`wrap-${sid}`)?.checked ?? false;

  posEl.style.left = (raw / 4095 * 100) + '%';

  if (swMin !== null && swMax !== null) {
    minEl.textContent = swMin; minBox.className = 'limit-box set-min';
    maxEl.textContent = swMax; maxBox.className = 'limit-box set-max';

    if (wrap) {
      // Range crosses 0/4095: two green zones — 0→swMin and swMax→4095
      // Use a CSS gradient on barEl to show both zones
      const minPct = swMin / 4095 * 100;
      const maxPct = swMax / 4095 * 100;
      barEl.style.left       = '0%';
      barEl.style.width      = '100%';
      barEl.style.background =
        `linear-gradient(to right,
          #16a34a66 0%, #16a34a66 ${minPct}%,
          #0f111700 ${minPct}%, #0f111700 ${maxPct}%,
          #16a34a66 ${maxPct}%, #16a34a66 100%)`;
    } else {
      // Normal range: single green zone swMin→swMax
      barEl.style.left       = (swMin / 4095 * 100) + '%';
      barEl.style.width      = ((swMax - swMin) / 4095 * 100) + '%';
      barEl.style.background = '#16a34a44';
    }
  } else if (swMin !== null) {
    minEl.textContent = swMin; minBox.className = 'limit-box set-min';
  } else if (swMax !== null) {
    maxEl.textContent = swMax; maxBox.className = 'limit-box set-max';
  }
}

function showManualLimits(sid) {
  const el = document.getElementById(`manual-limits-${sid}`);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function setLimitsDirect(sid, minVal, maxVal, wrap) {
  const res = await fetch('/api/set_limits_direct', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid, min: minVal, max: maxVal, wrap })
  });
  const d = await res.json();
  if (!d.ok) { showMsg(sid, 'Failed to apply limits', '#ef4444'); return; }
  const wrapCb = document.getElementById(`wrap-${sid}`);
  if (wrapCb) wrapCb.checked = d.wrap;
  showMsg(sid, `Limits applied — min=${d.min}, max=${d.max}, ${d.degrees}°${d.wrap ? ', wraps ✓' : ''}`, '#4ade80');
  document.getElementById(`rec-status-${sid}`).textContent =
    `min=${d.min}  max=${d.max}  travel=${d.degrees}°${d.wrap ? '  wraps ✓' : ''}`;
}

async function applyManual(sid) {
  const minVal = parseInt(document.getElementById(`man-min-${sid}`).value);
  const maxVal = parseInt(document.getElementById(`man-max-${sid}`).value);
  const wrap   = document.getElementById(`man-wrap-${sid}`).checked;
  if (isNaN(minVal) || isNaN(maxVal)) { showMsg(sid, 'Enter both min and max', '#ef4444'); return; }
  await setLimitsDirect(sid, minVal, maxVal, wrap);
  document.getElementById(`manual-limits-${sid}`).style.display = 'none';
}

async function applyFromCSV(sid) {
  const file = document.getElementById(`csv-file-${sid}`).files[0];
  if (!file) return;
  const text = await file.text();
  const lines = text.trim().split('\n').slice(1); // skip header
  const raws  = lines.map(l => parseInt(l.split(',')[1])).filter(v => !isNaN(v));
  if (raws.length < 2) { showMsg(sid, 'CSV too short', '#ef4444'); return; }

  // Detect wrap: large jump between consecutive values
  const wraps = raws.some((v, i) => i > 0 && Math.abs(v - raws[i-1]) > 2048);
  const minVal = raws[0];
  const maxVal = raws[raws.length - 1];
  const travel = wraps
    ? (sid === 4 ? ((minVal - maxVal + 4096) % 4096) : ((4095 - minVal) + maxVal))
    : Math.abs(maxVal - minVal);
  const degrees = (travel * 270 / 4095).toFixed(1);

  document.getElementById(`rec-status-${sid}`).textContent =
    `CSV: min=${minVal}, max=${maxVal}, ${wraps?'wraps ✓':'no wrap'}, ${degrees}°`;
  await setLimitsDirect(sid, minVal, maxVal, wraps);

  // Reset file input so same file can be re-loaded
  document.getElementById(`csv-file-${sid}`).value = '';
}

async function applyRecording(sid) {
  const res = await fetch('/api/apply_recording', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid })
  });
  const d = await res.json();
  if (!d.ok) { showMsg(sid, `Apply failed: ${d.error}`, '#ef4444'); return; }

  // Auto-check the wrap toggle if the range wraps
  const wrapCb = document.getElementById(`wrap-${sid}`);
  if (wrapCb) wrapCb.checked = d.wraps;

  document.getElementById(`rec-status-${sid}`).textContent =
    `Applied: min=${d.min}, max=${d.max}, ${d.wraps ? 'wraps ✓' : 'no wrap'}, travel=${d.degrees}°`;
  showMsg(sid, `Limits applied — ${d.degrees}° travel (${d.samples} samples)`, '#4ade80');
}

async function setZero(sid) {
  const res = await fetch('/api/set_zero', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid })
  });
  const d = await res.json();
  if (d.ok) { localPos[sid] = 0; showMsg(sid, `Zero set (raw=${d.offset_raw})`); }
  else       showMsg(sid, `Failed: ${d.error}`, '#ef4444');
}

async function defineMiddle(sid) {
  const res = await fetch('/api/define_middle', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid })
  });
  const d = await res.json();
  if (d.ok) {
    localPos[sid] = 0;
    document.getElementById(`lim-min-${sid}`).textContent = 'not set';
    document.getElementById(`lim-max-${sid}`).textContent = 'not set';
    document.getElementById(`lim-min-box-${sid}`).className = 'limit-box';
    document.getElementById(`lim-max-box-${sid}`).className = 'limit-box';
    document.getElementById(`lim-bar-${sid}`).style.cssText = '';
    showMsg(sid, `Middle defined${d.raw != null ? ` (raw=${d.raw})` : ''}; redefine limits now`, '#6ee7b7');
  } else {
    showMsg(sid, `Failed: ${d.error || 'Define middle failed'}`, '#ef4444');
  }
}

async function clearLimits(sid) {
  const res = await fetch('/api/clear_limits', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: sid })
  });
  const d = await res.json();
  if (d.ok) showMsg(sid, 'Angle limits cleared (0 – 4095)');
  else      showMsg(sid, 'Failed to clear limits', '#ef4444');
}

// ── Telemetry poll ────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res  = await fetch('/api/status');
    const data = await res.json();

    SERVO_IDS.forEach(sid => {
      const s    = data[sid];
      lastStatus[sid] = s;
      const card = document.getElementById(`card-${sid}`);
      const dot  = document.getElementById(`dot-${sid}`);

      if (!s.online) {
        card.className = 'card offline';
        dot.className  = 'status-dot';
        document.getElementById(`minus-${sid}`).disabled = true;
        document.getElementById(`plus-${sid}`).disabled  = true;
        return;
      }

      // Sync mode UI from hardware
      if (servoMode[sid] !== s.mode) applyModeUI(sid, s.mode);

      const isMotor = s.mode === 1;
      card.className = `card online${s.moving ? ' moving' : ''}${isMotor ? ' motor-mode' : ''}`;
      dot.className  = s.moving ? 'status-dot moving' : 'status-dot online';

      if (!isMotor) {
        document.getElementById(`minus-${sid}`).disabled = false;
        document.getElementById(`plus-${sid}`).disabled  = false;
      }

      // Position display (always)
      const cal = s.pos ?? 0;
      const angleDeg = typeof s.angle_deg === 'number' ? s.angle_deg : null;
      localPos[sid] = cal;
      document.getElementById(`pos-${sid}`).textContent = cal;
      document.getElementById(`sub-${sid}`).textContent =
        `raw: ${s.raw ?? '—'}  |  ${(s.raw / MAX_POS * 270).toFixed(1)}°`;

      // Motor mode live position chips
      if (isMotor) {
        const mpos = document.getElementById(`mpos-${sid}`);
        const mdeg = document.getElementById(`mdeg-${sid}`);
        if (mpos) mpos.textContent = s.raw ?? '—';
        if (mdeg) mdeg.textContent = angleDeg !== null ? angleDeg.toFixed(1) + '°' : '—';
      }

      // Bar always uses raw (0-4095 physical)
      const minRaw = (s.min_seen ?? 0) + (s.offset ?? 0);
      const maxRaw = (s.max_seen ?? 0) + (s.offset ?? 0);
      updateBar(sid, s.raw ?? 0, minRaw, maxRaw);

      // Range info
      document.getElementById(`min-${sid}`).textContent = s.min_seen ?? '—';
      document.getElementById(`max-${sid}`).textContent = s.max_seen ?? '—';
      document.getElementById(`raw-${sid}`).textContent = s.raw      ?? '—';
      document.getElementById(`ofs-${sid}`).textContent = s.offset   ?? 0;
      const span = (s.min_seen !== null && s.max_seen !== null) ? s.max_seen - s.min_seen : null;
      document.getElementById(`rng-${sid}`).textContent =
        span !== null ? `${span} (${(span / MAX_POS * 270).toFixed(1)}°)` : '—';

      // Sync wrap checkbox from backend
      const wrapCb = document.getElementById(`wrap-${sid}`);
      if (wrapCb) wrapCb.checked = false;

      // Joint limit bar
      updateLimitBar(sid, s.raw ?? 0, s.sw_min ?? null, s.sw_max ?? null);

      // Telemetry
      document.getElementById(`volt-${sid}`).textContent = s.volt   ?? '—';
      document.getElementById(`temp-${sid}`).textContent = s.temp   ?? '—';
      document.getElementById(`mov-${sid}`).textContent  = s.moving ? 'Yes' : 'No';
    });
    // Recording status
    try {
      const rres  = await fetch('/api/record_status');
      const rdata = await rres.json();
      SERVO_IDS.forEach(sid => {
        const r = rdata[sid];
        if (r && r.active) {
          document.getElementById(`rec-count-${sid}`).textContent = `● ${r.count} samples`;
        }
      });
    } catch(_) {}
  } catch(e) { console.warn('Poll error', e); }
  setTimeout(poll, 200);
}

poll();
</script>
