[gcode_macro SERVO_LIST]
description: Rescan the ST3215 bus for connected servos
gcode:
  {action_call_remote_method("publish_mqtt_topic",
                             topic="grafito/servo/command",
                             payload='{"action":"discover"}',
                             qos=0,
                             retain=False)}
