# ST3215 control macros for the persistent MQTT bridge.
# These macros assume Moonraker MQTT is configured because they use
# publish_mqtt_topic instead of launching a new Python process for each action.

[gcode_macro SERVO_MOVE]
description: Move a servo to a specific position (0-4095)
gcode:
  {% set sid = params.SERVO_ID|default(1)|int %}
  {% set pos = params.POSITION|default(2048)|int %}
  {% set spd = params.SPEED|default(1000)|int %}
  {% set payload = '{"action":"move","servo_id":%d,"position":%d,"speed":%d}' % (sid, pos, spd) %}
  {action_call_remote_method("publish_mqtt_topic",
                             topic="grafito/servo/command",
                             payload=payload,
                             qos=0,
                             retain=False)}

[gcode_macro SERVO_ANGLE]
description: Move a servo to a specific angle (0-360)
gcode:
  {% set sid = params.SERVO_ID|default(1)|int %}
  {% set ang = params.ANGLE|default(180)|float %}
  {% set spd = params.SPEED|default(1000)|int %}
  {% set pos = (ang * 4095 / 360)|int %}
  {% if pos < 0 %}
    {% set pos = 0 %}
  {% endif %}
  {% if pos > 4095 %}
    {% set pos = 4095 %}
  {% endif %}
  {% set payload = '{"action":"move","servo_id":%d,"position":%d,"speed":%d}' % (sid, pos, spd) %}
  {action_call_remote_method("publish_mqtt_topic",
                             topic="grafito/servo/command",
                             payload=payload,
                             qos=0,
                             retain=False)}

